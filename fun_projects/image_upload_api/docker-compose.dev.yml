# Local development infrastructure only (not used in production).
# Production uses AWS RDS (Postgres) and would provide its own broker.
# Run: docker compose -f docker-compose.dev.yml up -d
services:
  redis:
    image: redis:7
    container_name: image_redis
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    container_name: image_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
