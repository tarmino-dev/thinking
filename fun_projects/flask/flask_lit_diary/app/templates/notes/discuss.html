{% include "header.html" %}

<header class="masthead" style="background-image: url('{{ url_for('static', filename='assets/img/edit-bg.png') }}')">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <h1>{{ t('discuss_title') }}</h1>
          <span class="subheading">{{ note.title }}</span>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="mb-4">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">
        <div
          id="discuss-chat"
          class="mb-3"
          style="max-height: 50vh; overflow-y: auto; padding-right: 0.75rem;"
          data-discuss-url="{{ url_for('notes.discuss_message', note_id=note.id) }}"
          data-error-text="{{ t('discuss_error') }}"
          data-thinking-text="{{ t('discuss_thinking') }}"
        ></div>
        <form id="discuss-form" class="d-flex gap-2">
          <input
            id="discuss-input"
            class="form-control"
            type="text"
            placeholder="{{ t('discuss_placeholder') }}"
            autocomplete="off"
          />
          <button id="discuss-send" class="btn btn-primary" type="submit">
            {{ t('discuss_send') }}
          </button>
        </form>
        <p class="mt-3 mb-0">
          <a href="{{ url_for('notes.show_note', note_id=note.id) }}">{{ t('discuss_back') }}</a>
        </p>
      </div>
    </div>
  </div>
</main>

<script src="{{ url_for('static', filename='js/discuss.js') }}" defer></script>
{% include "footer.html" %}
