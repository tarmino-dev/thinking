name: Run Python Tests (Number Guessing)

on:
  push:
    paths:
      - "fun_projects/learning/number_guessing/**"
  pull_request:
    paths:
      - "fun_projects/learning/number_guessing/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r fun_projects/learning/number_guessing/requirements.txt

      - name: Run tests
        run: |
          cd fun_projects/learning/number_guessing
          pytest -vv
