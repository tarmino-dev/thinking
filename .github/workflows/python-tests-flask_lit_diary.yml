name: Run Python Tests (Flask Literature Diary)

on:
  push:
    paths:
      - "fun_projects/flask/flask_lit_diary/**"
  pull_request:
    paths:
      - "fun_projects/flask/flask_lit_diary/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fun_projects/flask/flask_lit_diary/requirements.txt

      - name: Run tests
        run: |
          cd fun_projects/flask/flask_lit_diary
          pytest -vv
